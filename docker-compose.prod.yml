# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./backups:/backups
    restart: always

  app:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    restart: always
    # Remove volume mounts in production (use image built at deploy time)
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: rugby-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - rugby_network
    restart: always

volumes:
  mysql_data_prod:
    driver: local

# Production checklist:
# 1. Set NODE_ENV=production in .env
# 2. Update JWT_SECRET to strong random value
# 3. Configure GEMINI_API_KEY
# 4. Set CORS_ORIGIN to production domain
# 5. Configure SSL certificates in ./ssl
# 6. Update nginx.conf with production domain
# 7. Set DB_PASSWORD to strong password
# 8. Enable database backups
# 9. Set up monitoring and logging
# 10. Configure health checks and auto-restart
